<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - KCSE Guidance Chatbot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/kcse/frontend/css/landing.css">
    <link rel="stylesheet" href="/kcse/frontend/css/theme.css?v=20260404">
    <link rel="stylesheet" href="/kcse/frontend/css/style.css?v=20260404">
    <script src="/kcse/frontend/js/theme.js" defer></script>
</head>
<body class="auth-page">
    <!-- Header -->
    <header class="landing-navbar">
        <div class="container">
            <div class="landing-nav-wrap">
                <a class="landing-navbar-brand" href="/kcse/frontend/landing.html">KCSE Guidance AI</a>
                <nav class="landing-nav-links">
                    <a href="/kcse/frontend/landing.html#about">About</a>
                    <a href="/kcse/frontend/landing.html#features">Features</a>
                    <a href="/kcse/frontend/landing.html#contact">Contact</a>
                </nav>
                <div class="landing-nav-actions">
                    <a href="/kcse/frontend/signup.html" class="landing-nav-signup">Sign Up</a>
                </div>
            </div>
        </div>
    </header>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-body">
                        <h3 class="card-title text-center mb-4">Sign In</h3>
                        <form id="signin-form">
                            <input type="email" class="form-control mb-3" id="signin-email" placeholder="Email" required>
                            <div class="input-group mb-3">
                                <input type="password" class="form-control" id="signin-password" placeholder="Password" required>
                                <button type="button" class="btn btn-outline-secondary password-toggle" data-target="signin-password" aria-label="Show password" aria-pressed="false">
                                    <svg class="password-eye-open" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16" aria-hidden="true">
                                        <path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8ZM1.173 8a13.133 13.133 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5c2.12 0 3.879 1.168 5.168 2.457A13.133 13.133 0 0 1 14.828 8c-.058.087-.122.183-.195.288-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.12 12.5 8 12.5c-2.12 0-3.879-1.168-5.168-2.457A13.134 13.134 0 0 1 1.172 8Z"/>
                                        <path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5ZM4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0Z"/>
                                    </svg>
                                    <svg class="password-eye-closed d-none" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16" aria-hidden="true">
                                        <path d="M13.359 11.238 15 12.879l-.707.707-1.81-1.81A8.97 8.97 0 0 1 8 13.5C3 13.5 0 8 0 8a15.74 15.74 0 0 1 3.292-3.912L1 1.793l.707-.707 13 13-.707.707-1.641-1.641ZM11.297 10.59l-1.307-1.307a2.5 2.5 0 0 1-3.273-3.273L5.41 4.703A13.504 13.504 0 0 0 1.173 8C2.272 9.465 4.756 12.5 8 12.5a7.98 7.98 0 0 0 3.297-.71ZM7.733 6.319l1.948 1.948a1.5 1.5 0 0 0-1.948-1.948Z"/>
                                        <path d="M8 3.5c3.244 0 5.728 3.035 6.827 4.5a13.245 13.245 0 0 1-1.636 1.954l-.715-.715A12.206 12.206 0 0 0 14.828 8c-1.099-1.465-3.583-4.5-6.828-4.5-.79 0-1.53.18-2.214.495l-.777-.777A7.97 7.97 0 0 1 8 3.5Z"/>
                                    </svg>
                                </button>
                            </div>
                            <button type="submit" class="btn btn-success w-100">Sign In</button>
                        </form>
                        <div id="signin-msg" class="mt-3 text-danger text-center"></div>
                        <div class="mt-3 text-center">
                            <span>Don't have an account? <a href="/kcse/frontend/signup.html">Sign Up</a></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Footer -->
    <footer class="ix-footer">
        <div class="ix-container ix-footer-grid">
            <div>
                <h4>Email</h4>
                <a href="mailto:melbrideb@gmail.com">melbrideb@gmail.com</a>
            </div>
            <div>
                <h4>Phone</h4>
                <a href="tel:0790117305">0790117305</a>
            </div>
            <div>
                <h4>Address</h4>
                <p>Meru, Kenya</p>
            </div>
        </div>
        <div class="ix-footnote">© 2026 KCSE Guidance AI</div>
    </footer>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/kcse/frontend/js/signin-script.js"></script>
</body>
</html>
