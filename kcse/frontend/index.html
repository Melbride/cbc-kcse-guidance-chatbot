<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KCSE Guidance AI</title> 
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="/kcse/frontend/css/chat.css">
  <link rel="stylesheet" href="/kcse/frontend/css/style.css?v=20260404">
  <link rel="stylesheet" href="/kcse/frontend/css/theme.css?v=20260404">
  <script src="/kcse/frontend/js/theme.js" defer></script>
</head>
<body class="chat-page">
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-top">
      <div class="sidebar-brand">
      </div>

      <button id="new-chat-btn" class="new-chat">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
        New chat
      </button>

      <div class="search-wrap">
        <input type="text" id="search-input" placeholder="Search chats" class="search">
      </div>
    </div>

    <div class="sidebar-content">
      <div class="sidebar-section-title">
        <span>Recent Chats</span>
        <i class="bi bi-chevron-down"></i>
      </div>
      <div id="chat-list" class="chat-list"></div>
    </div>

    <div class="profile-container">
      <button id="profile-btn" class="profile-btn">Profile</button>

      <div id="profile-menu" class="profile-menu hidden">
        <div id="view-profile">View Profile</div>
        <div id="settings">Settings</div>
        <div id="logout">Logout</div>
      </div>
    </div>
  </aside>

  <div class="chat-layout">
    <div class="chat-topbar">
      <div class="chat-topbar-main">
        <div class="chat-topbar-icon">AI</div>
        <div class="chat-topbar-info">
          <h2>KCSE Guidance Assistant</h2>
          <p>Ask about courses, careers, requirements, and next-step options after KCSE</p>
        </div>
      </div>
      <div class="chat-topbar-actions"></div>
    </div>

    <main id="chat-section" class="chat">
      <div id="chat-window" class="chat-messages">
      </div>

      <form id="chat-form" class="chat-input-area">
        <div class="chat-input-box">
          <input id="chat-input" class="search-input" type="text" placeholder="Ask about programmes, careers, or university requirements..." autocomplete="off" spellcheck="false">
          <button class="chat-send-btn" type="submit" title="Send message" aria-label="Send message">&gt;</button>
        </div>
      </form>
    </main>
  </div>
</div>

<script src="/kcse/frontend/js/script.js"></script>
</body>
</html>
