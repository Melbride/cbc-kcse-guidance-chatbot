<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — CBC Guide</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/cbc-guidance-chatbot/frontend/css/style.css">
  <link rel="stylesheet" href="/cbc-guidance-chatbot/frontend/css/theme.css">
  <script src="/cbc-guidance-chatbot/frontend/js/theme.js" defer></script>
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">CG</div>
      <h2>Welcome back</h2>
      <p>Sign in to continue your CBC journey</p>
    </div>
    <div class="auth-field">
      <label for="login-email">Email address</label>
      <input type="email" id="login-email" placeholder="you@example.com" onkeypress="if(event.key==='Enter') login()">
    </div>
    <div class="auth-field">
      <label for="login-password">Password</label>
      <input type="password" id="login-password" placeholder="Your password" onkeypress="if(event.key==='Enter') login()">
    </div>
    <button class="auth-submit" onclick="login()">Sign in</button>
    <div class="auth-alt">
      Don't have an account? <a href="/cbc-guidance-chatbot/frontend/signup.html">Create one</a>
    </div>
    <div class="auth-alt" style="margin-top:8px;">
      <a href="/cbc-guidance-chatbot/frontend/index.html" style="color:var(--muted);">Back to home</a>
    </div>
  </div>
</div>
<script src="/cbc-guidance-chatbot/frontend/js/main.js"></script>
</body>
</html>
