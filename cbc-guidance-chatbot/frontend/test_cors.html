<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORS Test - CBC Chatbot</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .result { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .success { background-color: #d4edda; color: #155724; }
        .error { background-color: #f8d7da; color: #721c24; }
        .info { background-color: #d1ecf1; color: #0c5460; }
        button { padding: 10px 20px; margin: 5px; }
    </style>
</head>
<body>
    <h1>🔗 CORS & API Test - CBC Chatbot</h1>
    
    <div id="results"></div>
    
    <button onclick="testHealthCheck()">Test Health Check</button>
    <button onclick="testCORS()">Test CORS</button>
    <button onclick="testQuery()">Test Query (Slow)</button>
    
    <script>
        const API_BASE = 'https://cbc-kcse-guidance-chatbot.onrender.com';
        
        function addResult(title, status, message) {
            const results = document.getElementById('results');
            const div = document.createElement('div');
            div.className = `result ${status}`;
            div.innerHTML = `<h3>${title}</h3><p>${message}</p>`;
            results.appendChild(div);
        }
        
        async function testHealthCheck() {
            try {
                const response = await fetch(`${API_BASE}/`);
                const data = await response.json();
                addResult('Health Check', 'success', 
                    `✅ Backend accessible! Status: ${data.status}, Service: ${data.service}`);
            } catch (error) {
                addResult('Health Check', 'error', 
                    `❌ Failed: ${error.message}`);
            }
        }
        
        async function testCORS() {
            try {
                const response = await fetch(`${API_BASE}/`, {
                    method: 'OPTIONS'
                });
                addResult('CORS Test', 'success', 
                    `✅ CORS working! Status: ${response.status}`);
            } catch (error) {
                addResult('CORS Test', 'error', 
                    `❌ CORS issue: ${error.message}`);
            }
        }
        
        async function testQuery() {
            addResult('Query Test', 'info', 
                '⏳ Testing query endpoint (this may take 10-30 seconds)...');
            
            try {
                const response = await fetch(`${API_BASE}/query/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        question: "What is CBC?",
                        user_id: "cors_test"
                    })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    addResult('Query Test', 'success', 
                        `✅ Query successful! Answer length: ${data.answer?.length || 0} characters`);
                } else {
                    addResult('Query Test', 'error', 
                        `❌ Query failed: ${response.status} ${response.statusText}`);
                }
            } catch (error) {
                addResult('Query Test', 'error', 
                    `❌ Query error: ${error.message}`);
            }
        }
        
        // Auto-run health check on load
        window.onload = testHealthCheck;
    </script>
</body>
</html>
