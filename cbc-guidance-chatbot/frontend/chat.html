<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat — CBC Guide</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/cbc-guidance-chatbot/frontend/css/style.css">
  <link rel="stylesheet" href="/cbc-guidance-chatbot/frontend/css/theme.css">
  <script src="/cbc-guidance-chatbot/frontend/js/theme.js" defer></script>
</head>
<body>
<div class="app-layout">
  <nav id="app-sidebar" class="sidebar"></nav>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <div class="chat-layout">
    <button class="sidebar-toggle" id="sidebar-toggle">☰</button>
    <div class="chat-topbar">
      <div class="chat-topbar-icon">AI</div>
      <div class="chat-topbar-info">
        <h2>CBC Guidance Assistant</h2>
        <p>Powered by AI · Answers about CBC pathways, subjects &amp; schools</p>
      </div>
    </div>
    <div class="chat-messages" id="chat-box"></div>
    <div id="guest-chat-hint" style="text-align:center; font-size:13px; color:#888; padding: 4px 0;"></div>
    <div class="chat-input-area">
      <div class="chat-input-box">
        <input type="text" id="chat-input" placeholder="Ask about pathways, results, schools..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button class="chat-send-btn" onclick="sendMessage()">&gt;</button>
      </div>
    </div>
  </div>
</div>
<script src="/cbc-guidance-chatbot/frontend/js/main.js"></script>
</body>
</html>
