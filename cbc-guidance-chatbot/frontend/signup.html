<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — CBC Guide</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/theme.css">
  <script src="js/theme.js" defer></script>
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">CG</div>
      <h2>Create your account</h2>
      <p>Start your personalized CBC guidance journey</p>
    </div>
    <div class="auth-field">
      <label for="signup-name">Full name</label>
      <input type="text" id="signup-name" placeholder="Your full name">
    </div>
    <div class="auth-field">
      <label for="signup-email">Email address</label>
      <input type="email" id="signup-email" placeholder="you@example.com">
    </div>
    <div class="auth-field">
      <label for="signup-password">Password</label>
      <input type="password" id="signup-password" placeholder="Create a password" onkeypress="if(event.key==='Enter') signUp()">
    </div>
    <button class="auth-submit" onclick="signUp()">Create account</button>
    <div class="auth-alt">
      Already have an account? <a href="login.html">Sign in</a>
    </div>
    <div class="auth-alt" style="margin-top:8px;">
      <a href="index.html" style="color:var(--muted);">Back to home</a>
    </div>
  </div>
</div>
<script src="js/main.js"></script>
</body>
</html>
